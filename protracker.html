<script class="prospero-timer">
  const prosperoDeploy = new Date("1971-10-28T13:49:59+09:30");

  function updateProsperoTimer() {
    const now = new Date();

    let diff = now - prosperoDeploy;
    let secondSince = Math.floor(diff / 1000);

    const seconds = secondSince % 60;
    secondSince = Math.floor(secondSince / 60);
    const minutes = secondSince % 60;
    secondSince = Math.floor(secondSince / 60);
    const hours = secondSince % 24;
    secondSince = Math.floor(secondSince / 24);

    let years = 0;
    let cursor = new Date(prosperoDeploy);
    while (true) {
      const nextYear = new Date(cursor);
      nextYear.setUTCFullYear(cursor.getUTCFullYear() + 1);
      if (nextYear <= now) {
        years += 1;
        cursor = nextYear;
      } else {
        break;
      }
    }
    
    const msRemaining = now - cursor;
    const days = Math.floor(msRemaining / (1000 * 60 * 60 * 24));

    document.getElementById("clock").textContent =
      `${years}y ${days}d ${hours}h ${minutes}m ${seconds}s`;
  }

  updateProsperoTimer();
  setInterval(updateProsperoTimer, 1000);
</script>
