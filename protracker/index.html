<script class="prospero-timer">
  const prosperoDeploy = new Date("1971-10-28T13:49:59+09:30");

  function updateProsperoTimer() {
    const now = new Date();

    let millisecondSince = now - prosperoDeploy;
    let timeSince = Math.floor(millisecondSince / 1000); //convert milliseconds into seconds

    const seconds = timeSince % 60; //give me seconds left after removing full minutes
    timeSince = Math.floor(timeSince / 60); //convert seconds into minutes
    const minutes = timeSince % 60; //give me minutes left after removing full hours
    timeSince = Math.floor(timeSince / 60); //convert minutes into hours
    const hours = timeSince % 24; //give me hours left after removing full days

    let years = 0; //count anniversaries until it passes present
    let cursor = new Date(prosperoDeploy);
    while (true) {
      const nextYear = new Date(cursor);
      nextYear.setUTCFullYear(cursor.getUTCFullYear() + 1);
      if (nextYear <= now) {
        years += 1;
        cursor = nextYear;
      } else {
        break;
      }
    }

    const sinceAnniversary = now - cursor; //milliseconds since last anniversary
    const days =
    Math.floor(sinceAnniversary / (1000 * 60 * 60 * 24)); //convert milliseconds into days

    document.getElementById("clock").textContent =
      `${years}y ${days}d ${hours}h ${minutes}m ${seconds}s`;
  }

  updateProsperoTimer();
  setInterval(updateProsperoTimer, 1000);
</script>
